name: Validate L2G Toolchain
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Materialize Control Center v0.3.4 runtime
        run: python modules/control-center/releases/0.3.4/build_release.py
      - name: Validate repository
        run: python scripts/validate_toolchain.py
