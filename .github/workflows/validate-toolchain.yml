name: Validate L2G Toolchain
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Materialize Control Center v0.3.4 runtime
        run: python modules/control-center/releases/0.3.4/build_release.py
      - name: Materialize Workshop v77 runtime
        run: python modules/workshop/releases/v77/build_release.py
      - name: Upload Workshop v77 materialization diagnostic
        uses: actions/upload-artifact@v4
        with:
          name: workshop-v77-materialization-diagnostic
          path: modules/workshop/releases/v77/materialization-diagnostic.json
          if-no-files-found: error
      - name: Validate repository
        run: python scripts/validate_toolchain.py
