name: Materialize Scoper v3.12

on:
  push:
    branches:
      - release/scoper-v3.12
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Materialize deterministic v3.12 runtime
        id: materialize
        shell: bash
        run: |
          set +e
          python3 modules/scoper/releases/v3.12/materialize.py
          echo "exit_code=$?" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Commit generated runtime or diagnostic
        shell: bash
        run: |
          git add modules/scoper/releases/v3.12/L2Scoper-v3.12.html modules/scoper/releases/v3.12/materialization-result.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No materialization changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Record L2G Scoper v3.12 materialization result"
          git push origin "HEAD:${TARGET_BRANCH}"

      - name: Enforce successful materialization
        if: steps.materialize.outputs.exit_code != '0'
        run: |
          cat modules/scoper/releases/v3.12/materialization-result.json
          exit 1
