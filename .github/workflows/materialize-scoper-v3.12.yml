name: Materialize Scoper v3.12

on:
  push:
    branches:
      - release/scoper-v3.12
  pull_request:
    types: [opened, synchronize, reopened]
    branches:
      - main

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    env:
      TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Check out release branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.TARGET_BRANCH }}
          fetch-depth: 0

      - name: Materialize deterministic v3.12 runtime
        run: python3 modules/scoper/releases/v3.12/materialize.py

      - name: Commit generated runtime when needed
        shell: bash
        run: |
          git add modules/scoper/releases/v3.12/L2Scoper-v3.12.html
          if git diff --cached --quiet; then
            echo "Scoper v3.12 runtime already matches the expected checksum."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Materialize L2G Scoper v3.12 runtime"
          git push origin "HEAD:${TARGET_BRANCH}"
