name: Materialize SSP v1.7.1 runtime

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Check out pull-request branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Materialize governed SSP runtime
        run: python modules/ssp/releases/v1.7.1/materialize.py

      - name: Commit generated runtime when needed
        shell: bash
        run: |
          RUNTIME="modules/ssp/releases/v1.7.1/CMMC_L2_SSP_Modern_Editable_v1.7.1.html"
          if [ -z "$(git status --porcelain -- "$RUNTIME")" ]; then
            echo "Governed SSP runtime is already materialized."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$RUNTIME"
          git commit -m "Materialize governed SSP v1.7.1 runtime"
          git push
