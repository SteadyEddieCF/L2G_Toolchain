name: Playwright QA

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright-qa:
    name: playwright-qa
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Run runtime and axe-core tests
        run: npm run test:qa
      - name: Upload Playwright QA report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-qa-report
          path: |
            test-results/playwright-report
            test-results/playwright-results.json
            test-results/playwright
          if-no-files-found: warn
          retention-days: 30

  visual-regression:
    name: visual-regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install --with-deps chromium
      - name: Compare or bootstrap visual baselines
        shell: bash
        run: |
          if find tests/playwright -type f -path '*-snapshots/*.png' -print -quit | grep -q .; then
            npm run test:visual
          else
            npm run test:visual -- --update-snapshots=missing
          fi
      - name: Upload visual baseline candidates and diffs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-baseline-candidates
          path: |
            tests/playwright/**/*-snapshots/*.png
            test-results/playwright-report
            test-results/playwright
          if-no-files-found: warn
          retention-days: 30

  windows-file-smoke:
    name: windows-file-smoke
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Install Chromium
        run: npx playwright install chromium
      - name: Run Windows file-origin smoke tests
        run: npm run test:file
      - name: Upload Windows smoke report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-file-smoke-report
          path: |
            test-results/playwright-report
            test-results/playwright-results.json
            test-results/playwright
          if-no-files-found: warn
          retention-days: 30
