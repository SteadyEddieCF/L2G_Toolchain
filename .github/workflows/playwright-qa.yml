name: Playwright QA

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  playwright-qa:
    name: playwright-qa
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '22', cache: npm}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Materialize Control Center v0.3.4 runtime
        run: python modules/control-center/releases/0.3.4/build_release.py
      - name: Materialize Workshop v77 runtime
        run: python modules/workshop/releases/v77/build_release.py
      - name: Materialize SSP v1.9.6 runtime
        run: python modules/ssp/releases/v1.9.6/materialize.py
      - run: npm ci --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Run runtime and axe-core tests
        run: npm run test:qa
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-qa-report
          path: |
            test-results/playwright-report
            test-results/playwright-results.json
            test-results/playwright
          if-no-files-found: warn
          retention-days: 30
  visual-regression:
    name: visual-regression
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '22', cache: npm}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Materialize Control Center v0.3.4 runtime
        run: python modules/control-center/releases/0.3.4/build_release.py
      - name: Materialize Workshop v77 runtime
        run: python modules/workshop/releases/v77/build_release.py
      - name: Materialize SSP v1.9.6 runtime
        run: python modules/ssp/releases/v1.9.6/materialize.py
      - run: npm ci --no-audit --no-fund
      - run: npx playwright install --with-deps chromium
      - name: Compare visual baselines
        run: npm run test:visual
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-report
          path: |
            test-results/playwright-report
            test-results/playwright-results.json
            test-results/playwright
          if-no-files-found: warn
          retention-days: 30
  windows-file-smoke:
    name: windows-file-smoke
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: '22', cache: npm}
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - name: Materialize Control Center v0.3.4 runtime
        run: python modules/control-center/releases/0.3.4/build_release.py
      - name: Materialize Workshop v77 runtime
        run: python modules/workshop/releases/v77/build_release.py
      - name: Materialize SSP v1.9.6 runtime
        run: python modules/ssp/releases/v1.9.6/materialize.py
      - run: npm ci --no-audit --no-fund
      - run: npx playwright install chromium
      - name: Run Windows file-origin smoke tests
        run: npm run test:file
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: windows-file-smoke-report
          path: |
            test-results/playwright-report
            test-results/playwright-results.json
            test-results/playwright
          if-no-files-found: warn
          retention-days: 30
