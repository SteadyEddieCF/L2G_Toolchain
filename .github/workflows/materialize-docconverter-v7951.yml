name: Materialize DocConverter v7.9.5.1 Runtime

on:
  push:
    branches:
      - release/docconverter-v7.9.5.1-runtime-promotion

permissions:
  contents: write

jobs:
  materialize-runtime:
    if: ${{ !contains(github.event.head_commit.message, '[runtime-materialized]') }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out promotion branch
        uses: actions/checkout@v4
        with:
          ref: release/docconverter-v7.9.5.1-runtime-promotion
          fetch-depth: 0

      - name: Build deterministic runtime
        run: |
          python modules/docconverter/releases/7.9.5.1/build_v7951.py \
            modules/docconverter/releases/v7.9.5/DocConverter-L2G_v7.9.5.html \
            modules/docconverter/releases/7.9.5.1/DocConverter-L2G_v7.9.5.1.html

      - name: Verify governed runtime hash
        shell: bash
        run: |
          expected='df64d0912b43d69d5eda256188458c3d32f9aa679c49ed43f6ddf4cb64b9c17d'
          actual="$(sha256sum modules/docconverter/releases/7.9.5.1/DocConverter-L2G_v7.9.5.1.html | awk '{print $1}')"
          test "$actual" = "$expected"
          test "$(stat -c %s modules/docconverter/releases/7.9.5.1/DocConverter-L2G_v7.9.5.1.html)" = '7952581'

      - name: Validate materialized tree
        run: python scripts/validate_toolchain.py

      - name: Commit runtime and remove one-time materializer
        shell: bash
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add modules/docconverter/releases/7.9.5.1/DocConverter-L2G_v7.9.5.1.html
          git rm .github/workflows/materialize-docconverter-v7951.yml
          git commit -m 'Materialize DocConverter v7.9.5.1 runtime [runtime-materialized]'
          git push origin HEAD:release/docconverter-v7.9.5.1-runtime-promotion
