name: Materialize SSP v1.7.1 runtime

on:
  push:
    branches:
      - release/cmmc-l2-ssp-v1.7.1
    paths:
      - '.github/workflows/materialize-ssp-v171.yml'

permissions:
  contents: write

jobs:
  materialize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: release/cmmc-l2-ssp-v1.7.1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Materialize governed SSP runtime
        run: python modules/ssp/releases/1.7.1/materialize.py
      - name: Commit generated runtime
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add modules/ssp/releases/1.7.1/CMMC_L2_SSP_Modern_Editable_v1.7.1.html modules/ssp/releases/1.7.1/materialization-result.json
          git diff --cached --quiet || git commit -m "Materialize CMMC L2 SSP v1.7.1 runtime [runtime-materialized]"
          git push origin HEAD:release/cmmc-l2-ssp-v1.7.1
