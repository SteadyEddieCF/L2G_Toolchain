function renderQuestionnaire(){document.getElementById('tab-questionnaire').innerHTML=header('Questionnaire','Generate the client-facing pre-engagement packet documents. The packet is designed to collect the baseline CUI boundary story before source review and the workshop.',`<button class="btn primary" onclick="downloadPreEngagementPacket()">Download Packet ZIP</button><button class="btn" onclick="downloadQuestionnaireWord()">Questionnaire Only</button>`)+`<div class="grid cols3"><div class="card"><h3>1. CUI Boundary Scoping Questionnaire</h3><p>Landscape Word document for business context, CUI ingress, processing, storage, backup/DR, provider access, egress, and unknowns. Section 11 is only a short summary so the client does not duplicate the worksheet.</p><button class="btn" onclick="downloadQuestionnaireWord()">Download Questionnaire</button></div><div class="card"><h3>2. Asset & Provider Worksheet</h3><p>Landscape Word worksheet with example rows for systems, services, people groups, facilities, security tools, and third-party/provider dependencies.</p><button class="btn" onclick="downloadAssetProviderWorksheet()">Download Worksheet</button></div><div class="card"><h3>3. Initial Evidence Request</h3><p>Landscape Word evidence request with high-value artifacts first, plus optional advanced items to support later review and import.</p><button class="btn" onclick="downloadEvidenceRequest()">Download Evidence Request</button></div></div><div class="callout"><strong>Client guidance:</strong> send the ZIP packet when starting the scoping effort. The completed packet should be processed with other source documents, diagrams, inventories, provider documents, and evidence trackers before importing scope context back into this tool.</div>`}
const prompts=[['ingress','01. CUI ingress','How does CUI enter the environment?','Prime/customer portals, GCC High email, SFTP, secure links, mail/shipping, or physical transfer.'],['travel','02. CUI travel and visibility','How does CUI travel, what does it touch, and who sees it?','Users, admins, helpdesk, MSPs, subcontractors, VPN, VDI, BYOD, laptops/desktops.'],['process','03. CUI processing / build / develop / manufacture','What systems handle, process, build, develop, or manufacture CUI products/services?','Engineering tools, COTS/SaaS, homegrown apps, databases, workstations, servers, labs, manufacturing systems.'],['storage','04. CUI storage / backup / DR','Where does CUI persist or get copied?','SharePoint, Teams, OneDrive, file servers, databases, backups, snapshots, archives, local cache, paper.'],['security','05. Security tools and segmentation','What security tools support or segment the CUI environment?','SIEM, EDR/AV, IAM/IdP, MFA, DLP, firewalls, VPN, CMDB, vulnerability scanner, wireless, MDM, badging, cameras.'],['providers','06. External providers and admin/support access','Which third parties support the CUI environment or security tooling?','MSP, MSSP, CSP, ESP, consultant, hosting, colocation, SOC, subcontractor, cloud provider.'],['egress','07. CUI egress / delivery','How do CUI or deliverables leave the environment?','Portal upload, email, SFTP, API, print, fax, shipment, subcontractor transfer, customer delivery.'],['export','08. Dissemination / export-control flags','Are export-control or limited dissemination requirements present or unknown?','ITAR, EAR, NOFORN, REL TO, proprietary, foreign support, support location, subcontractor transfer.']];
function promptFacts(id){const lower=o=>JSON.stringify(o).toLowerCase();let out=[];function add(x){x=clean(x);if(x&&!out.includes(x)&&out.length<5)out.push(x)};if(id==='ingress'){state.flows.filter(f=>/ingress/i.test(f.stage+f.name)).forEach(f=>add(`Potential ingress path: ${f.from} to ${f.to}; validate first storage location and approved channel.`));state.docs.filter(d=>/questionnaire|sow|contract|portal|email/i.test(d.filename+d.summary)).slice(0,2).forEach(d=>add(`Source material suggests contract/customer intake; use this to confirm how CUI is first received.`));}
else if(id==='travel'){state.assets.filter(a=>/cui asset|security protection/i.test(a.category)).slice(0,4).forEach(a=>add(`${a.name} may be visible in the CUI path; confirm who can access it and whether admins/providers can see CUI or metadata.`));}
else if(id==='process'){state.assets.filter(a=>/workstation|server|engineering|manufacturing|app|database|cui asset/i.test(a.name+a.type+a.notes+a.category)).slice(0,5).forEach(a=>add(`${a.name} is a candidate processing/support point; confirm actual business function and local handling.`));}
else if(id==='storage'){state.assets.filter(a=>/sharepoint|file|server|backup|s3|teams|onedrive|storage|cui asset/i.test(a.name+a.type+a.notes)).slice(0,5).forEach(a=>add(`${a.name} may store or copy CUI; validate retention, backup, restore, and admin access.`));}
else if(id==='security'){state.assets.filter(a=>/security protection|siem|mfa|edr|firewall|vpn|backup|servicenow|vuln|badge|camera/i.test(a.category+a.name+a.type+a.notes)).slice(0,5).forEach(a=>add(`${a.name} supports protection or segmentation; validate role, coverage, ownership, and evidence path.`));}
else if(id==='providers'){state.providers.slice(0,5).forEach(p=>add(`${p.name}: validate support role, admin access, CUI/SPD exposure, support location, and evidence ownership.`));}
else if(id==='egress'){state.flows.filter(f=>/egress|delivery|destination|subcontractor|portal/i.test(f.stage+f.name+f.notes)).forEach(f=>add(`Potential egress path: ${f.from} to ${f.to}; confirm approved destination, channel, and release owner.`));}
else if(id==='export'){state.questions.filter(q=>/export|itar|ear|noforn|foreign|dissemination|limited/i.test(q.question+q.area)).slice(0,5).forEach(q=>add(q.question));if(!out.length)add('No definitive export-control status was confirmed; validate markings, support location, and subcontractor transfer restrictions.');}
if(!out.length)add('No strong artifact-specific cue was imported for this prompt; use the client answer to identify systems, owners, unknowns, and evidence needed.');return out}
function renderPrework(){document.getElementById('tab-prework').innerHTML=header('Interview / Workshop','Guided prompts to run after source review and questionnaire return. Capture the CUI data path, systems, people, provider dependencies, evidence references, unknowns, and advisor follow-up questions.',`<button class="btn primary" onclick="seedFromPrework()">Draft Assets/Flows from Answers</button><button class="btn" onclick="downloadInterviewJSON()">Export Interview JSON</button><button class="btn" onclick="setTab('finish')">Go to Finish</button>`)+`<div class="callout"><strong>Use as interview/workshop script:</strong> answers should identify systems, applications, servers, tools, people, facilities, and third parties involved at each CUI stage. Keep unknowns visible rather than forcing premature scope decisions.</div><div class="questions">${prompts.map((p,i)=>{const v=state.prework[p[0]]||{};const facts=promptFacts(p[0]);return `<details ${i<2?'open':''}><summary><span>${esc(p[1])} — ${esc(p[2])}</span><span class="tag ${v.status==='Complete'?'good':v.status==='Needs Advisor Review'?'risk':'bad'}">${esc(v.status||'Not Started')}</span></summary><div class="qbody"><div class="chip">${esc(p[3])}</div><div class="preworkGrid"><div><div class="artifactContext"><strong>Artifact-informed discussion context</strong><ul>${facts.map(f=>`<li>${esc(f)}</li>`).join('')}</ul></div><label>Client answer</label><textarea oninput="state.prework['${p[0]}']={...state.prework['${p[0]}'],answer:this.value};save()" placeholder="Capture the client answer, systems named, unknowns, and follow-up questions...">${esc(v.answer||'')}</textarea></div><div><label>Status</label><select onchange="state.prework['${p[0]}']={...state.prework['${p[0]}'],status:this.value};save();render()"><option ${v.status==='Not Started'?'selected':''}>Not Started</option><option ${v.status==='In Progress'?'selected':''}>In Progress</option><option ${v.status==='Needs Advisor Review'?'selected':''}>Needs Advisor Review</option><option ${v.status==='Complete'?'selected':''}>Complete</option></select><label>Owner</label><input value="${esc(v.owner||'Client')}" oninput="state.prework['${p[0]}']={...state.prework['${p[0]}'],owner:this.value};save()"><label>Evidence refs</label><input value="${esc(v.evidence_refs||'')}" oninput="state.prework['${p[0]}']={...state.prework['${p[0]}'],evidence_refs:this.value};save()"></div><div class="span"><label>Advisor notes / assumptions</label><textarea oninput="state.prework['${p[0]}']={...state.prework['${p[0]}'],advisor_notes:this.value};save()" placeholder="Boundary assumptions, validation needed, likely assets/flows to add...">${esc(v.advisor_notes||'')}</textarea></div></div></div></details>`}).join('')}</div>`}
function seedFromPrework(){for(const [id,v] of Object.entries(state.prework)){const txt=clean((v.answer||'')+' '+(v.advisor_notes||''));if(!txt)continue;if(/servicenow|service now|snow/i.test(txt))normalizeServiceNow();if(/sharepoint|file server|server|laptop|workstation|firewall|siem|mfa|vpn|backup|edr|aws|gcc high/i.test(txt)){const name=(txt.match(/(SharePoint|ServiceNow|AWS GovCloud|GCC High|file server|firewall|SIEM|VPN|backup|EDR|MFA)/i)||[])[0];if(name&&!state.assets.some(a=>a.name.toLowerCase().includes(name.toLowerCase())))state.assets.push({id:uid('AST'),name,type:'Needs Review',environment:'',owner:v.owner||'',provider:'',category:'Needs Review',notes:`Drafted from ${id} interview answer; validate actual role.`,review:true,source_files:[]});}}save();render();toast('Drafted/updated candidates from interview answers.')}function downloadInterviewJSON(){downloadJSON({kind:'l2g_scoper_interview_workshop_notes_v1',organization:clientName(),answers:state.prework},clientFile('CUI_Boundary_Interview_Workshop_Notes','json'))}
function renderDiagram(){document.getElementById('tab-diagram').innerHTML=header('Diagram','Illustrative CUI boundary/data-flow view. This is not a final network diagram or assessment artifact.',`<button class="btn primary" onclick="openDiagramWindow()">Open in New Tab</button><button class="btn" onclick="downloadSVG()">SVG</button><button class="btn" onclick="downloadRaster('png')">PNG</button><button class="btn" onclick="downloadRaster('jpg')">JPG</button>`)+`<div class="svgwrap">${diagramSVG()}</div>`}
function diagramStageKey(f){const st=clean(f.stage).toLowerCase(),t=clean([f.stage,f.name,f.from,f.to,f.channel].join(' ')).toLowerCase();if(/ingress|receive/.test(st))return'ingress';if(/egress|delivery/.test(st))return'egress';if(/storage|backup|\bdr\b/.test(st))return'storage';if(/support|provider|admin|security/.test(st))return'support';if(/process|build|develop|manufactur/.test(st))return'processing';if(/travel|visibility|internal/.test(st))return'travel';if(/\bingress\b|receive|receipt|incoming|customer portal|dod portal|external source/.test(t))return'ingress';if(/\begress\b|delivery|deliverable|outbound|external destination|ship|transfer out|disposition/.test(t))return'egress';if(/backup|restore|replication|archive|\bdr\b|storage|repository|file share|database/.test(t))return'storage';if(/support|provider|admin|security|siem|edr|iam|mfa|firewall|vpn|servicenow|ticket/.test(t))return'support';if(/process|build|develop|manufactur|engineering|application|workstation|server|transform/.test(t))return'processing';return'travel'}
function diagramCleanLabel(s){s=clean(s).replace(/^(ingress|egress|processing|storage\s*\/\s*backup|support\s*\/\s*provider\s*\/\s*admin)\s*:\s*/i,'').replace(/\s+/g,' ').trim();return s}
function trimToCompletePhrase(s,max=120){s=diagramCleanLabel(s);if(!s)return'';s=s.replace(/\s+/g,' ').trim();if(s.length<=max)return s;const sentences=s.split(/(?<=[.!?])\s+/).filter(Boolean);if(sentences[0]&&sentences[0].length<=max)return sentences[0];let out='';for(const w of s.split(/\s+/)){const next=(out+' '+w).trim();if(next.length>max)break;out=next}out=out.replace(/[,:;\-–—\s]+$/,'').replace(/(and|or|with|including|through|to|from|for|of|the|a|an)$/i,'').trim();if(out&&/[a-z0-9)]$/i.test(out))out+='.';return out||s.slice(0,max).replace(/\s+\S*$/,'').replace(/[,:;\-–—\s]+$/,'')+'.'}
function diagramWords(s,max=84){return trimToCompletePhrase(s,max)}
function diagramWrap(s,maxChars=30,maxLines=4){const words=clean(s).split(/\s+/).filter(Boolean),lines=[];let line='';for(const word of words){const next=(line+' '+word).trim();if(next.length<=maxChars||!line)line=next;else{lines.push(line);line=word}}if(line)lines.push(line);return lines.slice(0,maxLines)}
function diagramText(x,y,lines,cls,lineH=18,anchor='start'){return `<text x="${x}" y="${y}" class="${cls}" text-anchor="${anchor}">${lines.map((l,i)=>`<tspan x="${x}" dy="${i?lineH:0}">${esc(l)}</tspan>`).join('')}</text>`}
function diagramFlowNode(f){const from=diagramWords(diagramCleanLabel(f.from),26),to=diagramWords(diagramCleanLabel(f.to),26);let title=from&&to?`${from} → ${to}`:diagramWords(diagramCleanLabel(f.name||from||to),70);const details=[];if(f.channel)details.push(`Channel: ${diagramWords(f.channel,34)}`);if(f.contains_cui)details.push(`CUI: ${diagramWords(f.contains_cui,24)}`);if(f.owner)details.push(`Owner: ${diagramWords(f.owner,28)}`);if(!details.length&&f.data)details.push(diagramWords(f.data,56));if(!details.length)details.push('Validate channel, ownership, and CUI handling.');return{title,detail:details.join(' • ')}}
function diagramStageItems(key){const flows=state.flows.filter(f=>diagramStageKey(f)===key).map(diagramFlowNode);const seen=new Set(),out=[];for(const n of flows){const k=(n.title+'|'+n.detail).toLowerCase();if(!n.title||seen.has(k))continue;seen.add(k);out.push(n)}if(key==='processing'&&out.length<3){for(const a of state.assets.filter(a=>a.processes||/cui asset|workstation|server|application/i.test(a.category+' '+a.type))){if(out.some(n=>n.title.toLowerCase().includes(clean(a.name).toLowerCase())))continue;out.push({title:diagramWords(a.name,58),detail:`${diagramWords(a.type||'System',26)} • ${diagramWords(a.owner||a.provider||'Ownership to validate',34)}`});if(out.length>=3)break}}if(key==='storage'&&out.length<3){for(const a of state.assets.filter(a=>a.stores||/repository|storage|sharepoint|file|database|backup/i.test(a.name+' '+a.type))){if(out.some(n=>n.title.toLowerCase().includes(clean(a.name).toLowerCase())))continue;out.push({title:diagramWords(a.name,58),detail:`${diagramWords(a.type||'Storage',26)} • CUI handling to validate`});if(out.length>=3)break}}if(key==='support'&&out.length<3){for(const p of state.providers.slice(0,3-out.length))out.push({title:diagramWords(p.name,72),detail:diagramWords(p.role||p.type||'Support dependency',72)})}const prompts={ingress:'Confirm approved receipt channel and first managed storage point.',travel:'Confirm internal routes, user visibility, remote access, and monitoring.',processing:'Confirm systems and people that create, view, or transform CUI.',storage:'Confirm repositories, backups, replication, retention, and restore access.',support:'Confirm provider and administrator access, support location, and evidence ownership.',egress:'Confirm approved destinations, delivery method, subcontractor handling, and disposition.'};if(!out.length)out.push({title:'Validation needed',detail:prompts[key]});return out.slice(0,3)}
function diagramSVG(){const W=1920,H=1040,margin=62,gap=22,colW=280,top=170,boxH=510;const stages=[['ingress','01','Ingress','#2F80ED','How CUI enters'],['travel','02','Travel / visibility','#17A398','Who and what can see it'],['processing','03','Processing','#2F80ED','Where CUI is handled'],['storage','04','Storage / backup','#17A398','Where CUI persists'],['support','05','Support / providers','#F59E0B','Who administers or supports it'],['egress','06','Egress','#2F80ED','How CUI leaves']];let svg=`<svg xmlns="${'http'+'://www.w3.org/2000/svg'}" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#F8FBFF"/><stop offset="1" stop-color="#EAF3FA"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0B2D45" flood-opacity=".14"/></filter><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="5" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#2F80ED"/></marker></defs><style>.title{font:700 38px Arial;fill:#0B3554}.sub{font:16px Arial;fill:#496C88}.stage{font:700 23px Arial;fill:#0B3554}.stageSub{font:13px Arial;fill:#5E7B92}.num{font:700 14px Arial;fill:#fff}.nodeTitle{font:700 14px Arial;fill:#0B3554}.nodeDetail{font:12px Arial;fill:#36566F}.provider{font:700 13px Arial;fill:#0B3554}.providerRole{font:11px Arial;fill:#56738A}</style><rect width="${W}" height="${H}" fill="url(#bg)"/><text x="62" y="62" class="title">Draft CUI Boundary / Data Flow View</text><text x="62" y="96" class="sub">Illustrative working view — validate actual architecture, CUI movement, provider access, administrative paths, backup/DR, and egress.</text><path d="M110 430 C430 315, 680 545, 960 425 S1470 320, 1810 430" fill="none" stroke="#D7E7F4" stroke-width="34" stroke-linecap="round"/><path d="M110 430 C430 315, 680 545, 960 425 S1470 320, 1810 430" fill="none" stroke="#2F80ED" stroke-width="5" stroke-linecap="round" stroke-dasharray="10 12" opacity=".55"/>`;stages.forEach((s,i)=>{const x=margin+i*(colW+gap),items=diagramStageItems(s[0]);svg+=`<g filter="url(#shadow)"><rect x="${x}" y="${top}" width="${colW}" height="${boxH}" rx="22" fill="#FFFFFF" stroke="#BED4E5"/><rect x="${x}" y="${top}" width="${colW}" height="10" rx="5" fill="${s[3]}"/><circle cx="${x+34}" cy="${top+48}" r="20" fill="${s[3]}"/><text x="${x+34}" y="${top+53}" class="num" text-anchor="middle">${s[1]}</text><text x="${x+66}" y="${top+48}" class="stage">${esc(s[2])}</text><text x="${x+66}" y="${top+70}" class="stageSub">${esc(s[4])}</text></g>`;items.forEach((n,j)=>{const ny=top+102+j*122;const t=diagramWrap(n.title,30,2),d=diagramWrap(n.detail,38,3),detailY=ny+27+t.length*17+8;svg+=`<g filter="url(#shadow)"><rect x="${x+18}" y="${ny}" width="${colW-36}" height="104" rx="14" fill="#F7FAFD" stroke="${s[3]}" stroke-width="1.5"/><rect x="${x+18}" y="${ny}" width="6" height="104" rx="3" fill="${s[3]}"/>${diagramText(x+36,ny+25,t,'nodeTitle',17)}${diagramText(x+36,detailY,d,'nodeDetail',14)}</g>`});if(i<stages.length-1){const ax=x+colW+3,ay=top+250;svg+=`<path d="M${ax} ${ay} C${ax+8} ${ay-12}, ${ax+gap-8} ${ay+12}, ${ax+gap-3} ${ay}" fill="none" stroke="#2F80ED" stroke-width="4" marker-end="url(#arrow)"/>`}});const providers=state.providers.filter(p=>!isBadName(p.name)).slice(0,5);svg+=`<rect x="250" y="720" width="1420" height="240" rx="24" fill="#0B3554"/><text x="282" y="760" class="stage" fill="#fff" style="fill:#fff">Security / administrative / provider support dependencies</text><text x="282" y="788" class="stageSub" style="fill:#BFD8EA">Supporting paths can intersect multiple CUI stages and must be validated separately.</text>`;const use=providers.length?providers:[{name:'Provider and administrative dependencies require validation',role:'Confirm access, support location, data exposure, and evidence ownership.'}];const pw=245,pg=16,start=282;use.forEach((p,i)=>{const x=start+i*(pw+pg),name=diagramWrap(diagramWords(p.name,46),25,2),role=diagramWrap(diagramWords(p.role||p.type||'Dependency to validate',110),31,4);svg+=`<rect x="${x}" y="815" width="${pw}" height="112" rx="12" fill="#FFFFFF" opacity=".98"/>${diagramText(x+12,838,name,'provider',14)}${diagramText(x+12,874,role,'providerRole',13)}`});svg+=`</svg>`;return svg}

tton></div></div>`}

function importActionOptions(row,i){const opts=[['add','Add'],['merge_nonblank','Merge nonblank fields'],['keep_current','Keep current'],['use_imported','Use imported'],['skip','Skip']];return `<select onchange="updateImportAction(${i},this.value)">${opts.map(([v,l])=>`<option value="${v}" ${row.action===v?'selected':''}>${l}</option>`).join('')}</select>`}
function compactPreview(v){if(v===null||v===undefined)return '';if(typeof v==='string')return v.slice(0,180);const s=JSON.stringify(v);return s.length>220?s.slice(0,220)+'…':s}
function renderImportPreview(){if(!pendingImport)return '';const c=importCounts();const info=pendingImport.packageInfo||{};return `<div id="importPreview" class="card"><h3>Import preview — no changes applied yet</h3><p class="tiny"><strong>Source:</strong> ${esc(pendingImport.sourceName)} &nbsp; <strong>Package:</strong> ${esc(info.package_kind||'unknown')} ${esc(info.package_version||'')}</p>${pendingImport.warnings.map(w=>`<div class="hint"><strong>Warning:</strong> ${esc(w)}</div>`).join('')}<div class="previewStats"><div class="previewStat"><strong>${c.new||0}</strong><span class="metriclabel">New</span></div><div class="previewStat"><strong>${c.matching||0}</strong><span class="metriclabel">Matching</span></div><div class="previewStat"><strong>${c.conflict||0}</strong><span class="metriclabel">Conflicts</span></div><div class="previewStat"><strong>${pendingImport.candidate.docs.length}</strong><span class="metriclabel">Documents</span></div><div class="previewStat"><strong>0</strong><span class="metriclabel">Practice rows</span></div></div><div class="hint"><strong>Default:</strong> Merge into the current workspace. Existing advisor edits and Interview / Workshop responses remain authoritative; imported values fill blanks unless you select a different action below.</div><label><input id="preserveInterview" type="checkbox" checked style="width:auto;margin-right:8px"> Preserve current Interview / Workshop responses and advisor notes</label><div class="tablewrap previewTable"><table class="data"><thead><tr><th>Type</th><th>Record</th><th>Status</th><th>Current</th><th>Incoming</th><th>Action</th></tr></thead><tbody>${importPlan.map((r,i)=>`<tr><td>${esc(r.kind)}</td><td>${esc(r.label)}</td><td><span class="tag ${r.status==='conflict'?'risk':r.status==='new'?'good':''}">${esc(r.status)}</span></td><td>${esc(compactPreview(r.current))}</td><td>${esc(compactPreview(r.incoming))}</td><td>${importActionOptions(r,i)}</td></tr>`).join('')}</tbody></table></div><div class="applyBar btnrow"><button class="btn primary" onclick="applyStagedImport('merge')">Apply Merge / Update</button><button class="btn" onclick="applyStagedImport('replace')">Replace Workspace</button><button class="btn danger" onclick="cancelStagedImport()">Cancel Import</button></div></div>`}
function renderSettings(){document.getElementById('tab-settings').innerHTML=header('Settings','Local/offline settings, staged JSON import, presentation template, and workspace controls.',`<button class="btn danger" onclick="clearData()">Clear all local data</button>`)+`<div class="grid cols2"><div class="card"><h3>Workspace settings</h3><label>Client name for filenames/reports</label><input value="${esc(clientName())}" oninput="state.settings.clientName=this.value;state.org.name=this.value;save()"><label>Environment / boundary label</label><input value="${esc(state.org.environment||'')}" oninput="state.org.environment=this.value;save()"><label>CMMC target</label><input value="${esc(state.org.target||'CMMC Level 2')}" oninput="state.org.target=this.value;save()"><h3 style="margin-top:18px">Client presentation contact</h3><label>Contact name</label><input value="${esc(state.settings.contactName||'')}" oninput="state.settings.contactName=this.value;save()"><label>Title</label><input value="${esc(state.settings.contactTitle||'')}" oninput="state.settings.contactTitle=this.value;save()"><label>Email</label><input value="${esc(state.settings.contactEmail||'')}" oninput="state.settings.contactEmail=this.value;save()"><label>Phone</label><input value="${esc(state.settings.contactPhone||'')}" oninput="state.settings.contactPhone=this.value;save()"><label>Website</label><input value="${esc(state.settings.contactWebsite||'www.coalfire.com')}" oninput="state.settings.contactWebsite=this.value;save()"></div><div id="importCard" class="card"><h3>Import scope context JSON</h3><p>Parse and validate the package first. Nothing is changed until you review the preview and click an Apply action.</p><div class="importDrop"><strong>Upload JSON</strong><input type="file" accept=".json,application/json" onchange="handleImportFile(event)"></div><label>Or paste JSON</label><textarea id="importPaste" placeholder="Paste l2g_scope_context_v1.json here..."></textarea><button class="btn primary" onclick="importFromPaste()">Preview Import</button><p class="tiny">Default application mode is merge/update. Replace Workspace is available only after preview.</p></div></div><div style="height:14px"></div>${renderImportPreview()}<div style="height:14px"></div><div class="grid cols2"><div class="card"><h3>Return-package pre-flight</h3><pre>${esc(preflightText())}</pre><div class="btnrow"><button class="btn" onclick="refresh()">Refresh Status</button><button class="btn" onclick="fixExportErrors()">Fix Export Errors</button></div></div><div class="card"><h3>Local-only guardrails</h3><ul><li>No internet access, telemetry, cloud calls, external scripts, API keys, or uploads.</li><li>Uploaded PowerPoint templates stay in memory for this browser session and are not saved in localStorage.</li><li>All import changes require a preview and explicit Apply action.</li><li>Clear local data before using with a different client.</li></ul></div></div>`}
function clearData(){if(confirm('Clear local Scoper data?')){localStorage.removeItem(STORE);sessionStorage.removeItem(STORE);state=defaults();dirty=true;render();toast('Local data cleared.')}}
function addAsset(){const name=prompt('Asset name');if(!name)return;state.assets.push({id:uid('AST'),name,type:'Technology',category:'Needs Review',review:true,source_files:[],notes:''});save();render()}function editAsset(i){const a=state.assets[i];const name=prompt('Asset name',a.name);if(name){a.name=name;save();render()}}function addProvider(){const name=prompt('Provider name');if(!name)return;state.providers.push({id:uid('ESP'),name,type:'Provider / ESP',role:'',admin:'Unknown',cui:'Unknown',review:true,source_files:[]});save();render()}function editProvider(i){const p=state.providers[i];const name=prompt('Provider name',p.name);if(name){p.name=name;save();render()}}function addFlow(){const from=prompt('Flow source');if(!from)return;const to=prompt('Flow destination')||'Unknown destination';state.flows.push({id:uid('FLOW'),stage:'Needs Review',from,to,name:`${from} → ${to}`,contains_cui:'Unknown',source_files:[]});save();render()}function editFlow(i){const f=state.flows[i];const name=prompt('Flow name',f.name);if(name){f.name=name;save();render()}}
function clientDocCss(orientation){return orientation==='landscape'?`@page Section1{size:11in 8.5in;mso-page-orientation:landscape;margin:.45in;}div.Section1{page:Section1}@page{size:landscape;margin:.45in}body{font-family:Arial,Helvetica,sans-serif;color:#1f2937;background:#fff;line-height:1.25}h1{font-size:22pt;color:#0f3d5e;text-align:center;margin:0 0 4px}h2{font-size:14pt;color:#0f3d5e;border-bottom:2px solid #b7d3f2;padding-bottom:3px;page-break-after:avoid}p,li{font-size:9.5pt}.small{font-size:8.5pt;color:#52677f}.guardrail{border:1px solid #b7d3f2;background:#eef5ff;padding:9px;margin:8px 0 12px}table{border-collapse:collapse;width:100%;table-layout:fixed;margin:6px 0 14px}tr{page-break-inside:avoid}th,td{border:1px solid #7f8fa3;padding:6px;font-size:9pt;vertical-align:top}th{background:#b7d3f2;color:#172033}.response{height:.85in}.pagebreak{page-break-before:always}`:`@page Section1{size:8.5in 11in;mso-page-orientation:portrait;margin:.7in;}div.Section1{page:Section1}@page{size:portrait;margin:.7in}body{font-family:Arial,Helvetica,sans-serif;color:#1f2937;background:#fff;line-height:1.38}h1{font-size:24pt;color:#0f3d5e;margin:0 0 6px}h2{font-size:15pt;color:#0f3d5e;border-bottom:2px solid #b7d3f2;padding-bottom:3px;page-break-after:avoid}h3{font-size:12pt;color:#243b53}p,li{font-size:10.5pt}.small{font-size:8.5pt;color:#52677f}.guardrail,.callout{border:1px solid #b7d3f2;background:#eef5ff;padding:10px;margin:10px 0 14px}table{border-collapse:collapse;width:100%;table-layout:fixed;margin:8px 0 15px}tr{page-break-inside:avoid}th,td{border:1px solid #7f8fa3;padding:6px;font-size:9.5pt;vertical-align:top}th{background:#b7d3f2;color:#172033}.placeholder{border:1px dashed #7f8fa3;background:#f8fafc;color:#52677f;text-align:center;padding:38px;margin:12px 0}.draft-diagram{margin:12px 0;text-align:center;page-break-inside:avoid}.draft-diagram img{display:block;width:6.67in;height:3.33in;max-width:100%;margin:0 auto;border:1px solid #b7d3f2}.draft-diagram .small{text-align:left;margin:7px 0 0}.pagebreak{page-break-before:always}`}
function docWrap(title,body,orientation='landscape'){return `<!doctype html><html><head><meta charset="utf-8"><title>${esc(title)}</title><style>${clientDocCss(orientation)}</style></head><body><div class="Section1"><h1>${esc(title)}</h1>${body}</div></body></html>`}
function lineRows(n=3){return '<div style="border-bottom:1px solid #b7c0cc;height:.25in"></div>'.repeat(n)}
function makeQuestionnaire(){const sections=[['1. Organization, CMMC target, and boundary label',['Organization / OSA legal name','System, enclave, project, or service name','Assessment environment summary','Expected CMMC target','Primary client POC and security/IT lead','Contracts, programs, or customer relationships driving CUI/FCI need']],['2. CUI and FCI context',['Is CUI currently present or expected?','Is FCI currently present or expected?','Expected CUI or sensitive data categories','Export-control or limited dissemination concerns']],['3. CUI ingress - how CUI enters',['How does CUI enter the environment?','Which systems or applications are used at entry?','Who initially receives or sees CUI?','What is unknown about CUI entry points?']],['4. CUI processing and handling',['What systems, applications, tools, workstations, servers, labs, or manufacturing systems process or handle CUI?','What people or teams work with CUI during processing?','Can users download, sync, print, screenshot, copy/paste, or locally store CUI?','What processing or handling questions need validation?']],['5. CUI storage, backup, and disaster recovery',['Where is CUI stored?','Where is CUI backed up, replicated, archived, or retained?','Who can administer or access CUI storage and backup locations?','What storage, backup, retention, or DR questions need validation?']],['6. CUI transmission and egress',['How does CUI move internally or externally?','How does the product, service, or deliverable leave the environment?','Are subcontractors or third parties receiving, processing, storing, transmitting, or supporting CUI?','What egress or transmission questions need validation?']],['7. Security tools, segmentation, and supporting assets',['What security tools protect, monitor, or control the CUI environment?','What systems provide identity, privileged access, logging, monitoring, boundary protection, or backup support?','How is the CUI environment separated from out-of-scope systems?','What security tool or segmentation questions need validation?']],['8. External providers, administrators, and support access',['Which external providers support the CUI environment or security tooling?','Which providers have administrative access or support access?','Which provider responsibilities or evidence paths are unclear?','Are provider personnel outside the U.S. or non-U.S. persons involved in support?']],['9. Facilities, remote work, and physical handling',['What facilities are used to receive, process, store, print, ship, or discuss CUI?','Is CUI printed, scanned, faxed, shipped, or physically stored?','What physical controls protect CUI activities?','What remote work or alternate worksite conditions apply?']],['10. Boundary assumptions, unknowns, and validation needs',['What systems or assets do you believe are clearly in scope?','What systems or assets do you believe are out of scope?','What assets can access CUI but are not intended to do so?','What specialized assets exist?','What are the top open questions to validate with the advisor?']]];let body=`<div class="small" style="text-align:center">Document version: 1.0</div><div class="guardrail"><strong>Purpose:</strong> This questionnaire helps identify where CUI may enter, move through, be stored, be backed up, be protected/administered, and leave the environment. Responses create draft CUI boundary context and advisor validation questions.<br><br><strong>Handling note:</strong> Do not include CUI, credentials, passwords, sensitive screenshots, export-controlled technical data, or restricted program details. Use general descriptions, system names, roles, filenames, ticket IDs, and approved repository references.</div><p><strong>Client instructions:</strong> answer in plain English. Use <strong>Unknown</strong> when uncertain. Use <strong>Not applicable</strong> when a question does not apply. If also completing the Asset & Provider Worksheet, use section 11 for a short summary only.</p>`;sections.forEach(([h,qs])=>{body+=`<h2>${esc(h)}</h2><table><thead><tr><th style="width:4%">No.</th><th style="width:15%">Question</th><th style="width:18%">Helpful details to include</th><th style="width:63%">Client response</th></tr></thead><tbody>`;qs.forEach((q,i)=>body+=`<tr><td>${h.split('.')[0]}.${i+1}</td><td>${esc(q)}</td><td>Systems, owners, providers, evidence references, unknowns, and assumptions.</td><td class="response">${lineRows(3)}</td></tr>`);body+='</tbody></table>'});body+=`<h2>11. Asset and provider summary</h2><p>Use this short section only to summarize the most important assets/providers. Use the separate Asset & Provider Worksheet for full detail.</p><table><tr><th style="width:25%">Summary item</th><th>Client response</th></tr><tr><td>Most important systems/services</td><td class="response">${lineRows(3)}</td></tr><tr><td>Most important providers/support dependencies</td><td class="response">${lineRows(3)}</td></tr><tr><td>Known unknowns</td><td class="response">${lineRows(3)}</td></tr></table><h2>12. Completion confirmation</h2><table><tr><th style="text-align:left">Completed by:</th><td></td><th style="text-align:left">Role / title:</th><td></td></tr><tr><th style="text-align:left">Completion date:</th><td></td><th style="text-align:left">Additional notes:</th><td></td></tr></table>`;return docWrap('CMMC Level 2 CUI Boundary & Scoping Questionnaire',body,'landscape')}
function makeAssetWorksheet(){return docWrap('CUI Boundary Asset & Provider Worksheet',`<div class="guardrail"><strong>Client instructions:</strong> Complete the sections below for systems, services, applications, facilities, people groups, and providers that may process, store, transmit, access, administer, support, or protect CUI. Use Unknown when unsure. Do not include CUI or sensitive screenshots.</div><h2>Assets, systems, services, facilities, and people groups</h2><table><thead><tr><th>Name</th><th>Type</th><th>Owner/provider</th><th>What it does or touches</th><th>Proposed category</th><th>Rationale / notes</th></tr></thead><tbody><tr><td>Example: GCC High SharePoint</td><td>SaaS repository</td><td>Organization / Microsoft</td><td>Stores CUI and supports collaboration</td><td>CUI Asset</td><td>Validate sharing, retention, admin access.</td></tr>${'<tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>'.repeat(10)}</tbody></table><h2 class="pagebreak">External providers, administrators, and support dependencies</h2><table><thead><tr><th>Provider</th><th>Type</th><th>Role / service</th><th>Admin access?</th><th>CUI/SPD access?</th><th>Evidence / validation need</th></tr></thead><tbody><tr><td>Example: MSP</td><td>MSP / ESP</td><td>Firewall, VPN, backup, endpoint support</td><td>Yes</td><td>Unknown</td><td>Validate access, support location, evidence ownership.</td></tr>${'<tr><td></td><td></td><td></td><td></td><td></td><td></td></tr>'.repeat(8)}</tbody></table>`,'landscape')}
function makeEvidenceRequest(){const rows=[['Critical','Current SSP or boundary summary','Establishes the intended boundary, connected systems, and assumptions.'],['Critical','Asset inventory / Asset & Provider Worksheet','Identifies candidate CUI Assets, Security Protection Assets, Contractor Risk Managed Assets, Specialized Assets, and out-of-scope claims.'],['Critical','Network or CUI data-flow diagram','Supports validation of ingress, processing, storage, backup, support, and egress paths.'],['High','Provider responsibility/shared responsibility documents','Clarifies provider roles, support access, flow-down, and evidence ownership.'],['High','Access control / privileged access procedure','Supports validation of account approval, MFA, provider access, and access reviews.'],['High','MFA/conditional access summary','Shows whether privileged and remote access is protected as claimed.'],['High','SIEM/log source list','Shows monitoring coverage and MSSP evidence ownership.'],['High','Backup/DR summary','Identifies CUI copies, backup admins, restore approvals, and provider involvement.'],['Medium','Vulnerability scan summary','Supports scan coverage, remediation ownership, and provider evidence path.'],['Medium','Firewall/VPN rule summary','Supports segmentation, VPN, and egress validation.'],['Medium','Ticketing/access/change workflow export','Shows approval trail and whether tickets avoid CUI attachments.'],['Medium','Subcontractor flow-down/secure transfer process','Clarifies third-party CUI transfer, deletion, and retention expectations.']];return docWrap('Initial Evidence Request',`<div class="guardrail"><strong>Client instructions:</strong> Provide filenames, repository references, or ticket IDs. Do not paste CUI, credentials, screenshots with sensitive details, or controlled technical data. The Standard/Critical items are most important; Advanced/Medium items can follow when available.</div><table><thead><tr><th style="width:9%">Priority</th><th style="width:23%">Artifact / evidence requested</th><th style="width:29%">Why it helps</th><th style="width:29%">Client response / repository reference</th><th style="width:10%">Status</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td><td>${r[2]}</td><td class="response">${lineRows(2)}</td><td></td></tr>`).join('')}</tbody></table>`,'landscape')}
function summaryRows(){return `<table><thead><tr><th>Area</th><th>Draft status</th><th>Client-facing meaning</th></tr></thead><tbody><tr><td>Candidate CUI Assets</td><td>${state.assets.filter(a=>/CUI Asset/i.test(a.category)).length||'Needs validation'}</td><td>Systems, services, people groups, or facilities that may process, store, or transmit CUI.</td></tr><tr><td>Security Protection Assets</td><td>${state.assets.filter(a=>/Security Protection/i.test(a.category)).length||'Needs validation'}</td><td>Security, monitoring, identity, backup, or administrative tools that may support the CUI boundary.</td></tr><tr><td>Provider/support dependencies</td><td>${state.providers.length||'Needs validation'}</td><td>Third parties or shared-service paths that may affect access, evidence ownership, support location, or responsibility boundaries.</td></tr><tr><td>CUI data path</td><td>${state.flows.length||'Needs validation'}</td><td>Draft ingress, travel, processing, storage, support, and egress paths that need walkthrough confirmation.</td></tr></tbody></table>`}
function bytesToBase64(bytes){let out='';const chunk=32768;for(let i=0;i<bytes.length;i+=chunk)out+=String.fromCharCode(...bytes.subarray(i,Math.min(i+chunk,bytes.length)));return btoa(out)}
async function clientDraftDiagramHtml(){try{const diagram=await diagramPngBytes();return `<div class="draft-diagram"><img width="640" height="320" style="width:6.67in;height:3.33in;max-width:100%;" src="data:image/png;base64,${bytesToBase64(diagram.bytes)}" alt="Illustrative draft CUI boundary and data flow diagram generated from the current L2G Scoper workspace."><p class="small"><strong>Draft and illustrative:</strong> This diagram reflects the current working scope context and should be validated with business, technical, security, and provider stakeholders before formal use.</p></div>`}catch(err){console.error(err);return `<div class="placeholder">The draft diagram could not be rendered automatically. Export the current diagram from L2G Scoper and insert it here.</div>`}}
async function makeClientReport(){const draftDiagram=await clientDraftDiagramHtml();return docWrap('CUI Boundary Executive Summary',`<p><strong>${esc(clientName())}</strong> • Document version: 1.0</p><div class="callout"><strong>Client-facing draft:</strong> This summary describes the scoping information reviewed and the validation focus for the CUI boundary discussion. It is not a CMMC assessment result or final scope determination.</div><h2>Summary of scoping effort</h2><p>Coalfire reviewed the available pre-engagement materials and captured draft scoping context to support a CMMC Level 2 CUI boundary discussion. The objective is to understand how CUI may enter the environment, where it may be processed or stored, which systems or providers support the boundary, and how CUI or related deliverables may leave the environment.</p><p>The current draft should be used as a working discussion baseline. The client should validate data movement, provider access, asset categorization, supporting evidence, and any assumptions before the boundary is used for formal planning, documentation, or external discussion.</p>${summaryRows()}<h2>Artifacts reviewed</h2><ul>${state.docs.slice(0,20).map(d=>`<li>${esc(d.filename)} - ${esc(d.type||'reviewed source')}</li>`).join('')||'<li>No artifacts imported yet.</li>'}</ul><h2>Current validation focus</h2><p>The highest-value validation topics are the actual CUI ingress path, first storage location, local endpoint handling, backup/DR copies, security tool coverage, provider administrator access, subcontractor transfer, and export-control or limited dissemination requirements.</p><h2>Recommended next steps</h2><ul><li>Complete or update missing pre-engagement inputs listed below.</li><li>Confirm the actual CUI path with business, engineering, IT/security, and provider stakeholders.</li><li>Validate provider responsibilities, support location, CUI/SPD exposure, and evidence ownership.</li><li>Update the asset inventory, SSP boundary description, and boundary diagram after validation.</li><li>Use the validated boundary as the starting point for the CMMC Level 2 gap workshop and remediation planning.</li></ul><h2>Missing items or limitations</h2><ul>${missingItems().map(x=>`<li>${esc(x)}</li>`).join('')||'<li>No obvious missing input list generated.</li>'}</ul><h2 class="pagebreak">Draft Diagram</h2>${draftDiagram}`,'portrait')}
function makeAdvisorReport(){return docWrap('CUI Boundary Scoping Advisor Report',`<p><strong>${esc(clientName())}</strong> • Document version: 1.0</p><div class="callout"><strong>Advisor-facing draft:</strong> This report preserves source context, open questions, candidate scope items, and validation needs. It is not a final CMMC scope conclusion.</div><h2>Pre-flight summary</h2><pre>${esc(preflightText())}</pre><h2>Candidate asset summary</h2>${renderReportTable(['Name','Type','Category','Owner/Provider','Validation need'],state.assets.map(a=>[a.name,a.type,a.category,[a.owner,a.provider].filter(Boolean).join(' / '),a.notes||'Validate category, CUI handling, access, and evidence path.']))}<h2>Provider dependency summary</h2>${renderReportTable(['Provider','Type','Role','Access','Validation need'],state.providers.map(p=>[p.name,p.type,p.role,`Admin: ${p.admin}; CUI: ${p.cui}`,p.questions||'Validate provider dependency.']))}<h2>CUI flow summary</h2>${renderReportTable(['Stage','Flow','Channel','CUI?','Notes'],state.flows.map(f=>[f.stage,f.name,f.channel,f.contains_cui,f.notes||f.controls||'Validate flow.']))}<h2 class="pagebreak">Diagram placeholder</h2><div class="placeholder">Insert exported PNG/JPG CUI boundary diagram here.</div>`,'portrait')}
function renderReportTable(headers,rows){return `<table><thead><tr>${headers.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead><tbody>${(rows.length?rows:[['Not yet captured','','','','']]).map(r=>`<tr>${r.map(c=>`<td>${esc(c)}</td>`).join('')}</tr>`).join('')}</tbody></table>`}
function downloadQuestionnaireWord(){downloadBlob(new Blob([makeQuestionnaire()],{type:'application/msword'}),'CUI_Boundary_Scoping_Questionnaire.doc')}
function downloadAssetProviderWorksheet(){downloadBlob(new Blob([makeAssetWorksheet()],{type:'application/msword'}),'CUI_Boundary_Asset_Provider_Worksheet.doc')}

function pptTargetFont(ph,bounds,text){
  const w=(bounds?.cx||0)/914400,h=(bounds?.cy||0)/914400,area=w*h,len=clean(text).length,lines=String(text||'').split(/\n/).length;
  let pt=14;
  if(/client_name/.test(ph))pt=20;
  else if(/engagement_subtitle|prepared_by|deck_date|contact_/.test(ph))pt=12.5;
  else if(/advisory_status|draft_status/.test(ph))pt=11.5;
  else if(/next_step_/.test(ph))pt=13.5;
  else if(/takeaway_|_validation|_summary|diagram_context|diagram_guardrail|provider_dependency/.test(ph))pt=13.5;
  else if(/_bullets|provider_categories|provider_validation|missing_items|inputs_reviewed/.test(ph))pt=14;
  else if(area<0.8)pt=12;
  else if(area<1.4)pt=12.5;
  else if(area<2.4)pt=13;
  else if(area>6)pt=15;
  if(len>420||lines>9)pt=Math.min(pt,11.5); else if(len>300||lines>7)pt=Math.min(pt,12); else if(len>190||lines>5)pt=Math.min(pt,12.5);
  return Math.max(11,pt)
}

    const dRows=decisions.filter(d=>d.materiality==='boundary_blocker'||d.proposed_disposition!=='included').slice(0,40).map(d=>[d.decision_id,d.topic,d.proposed_disposition,d.rationale,v312Affected(d),d.validating_stakeholder,d.validation_status,d.next_action]);
    const uRows=unknowns.slice(0,40).map(d=>[d.topic,d.blocking_state,d.unresolved_dependency||d.rationale,d.validating_stakeholder,d.next_action,d.related_question_ids.join(', ')]);
    const before=questions.filter(q=>q.phase==='before_workshop'),during=questions.filter(q=>q.phase==='during_workshop');
    const qRows=arr=>arr.map(q=>[q.priority,q.question,q.expected_respondent,[...q.related_decision_ids,...q.related_asset_ids,...q.related_provider_ids,...q.related_flow_ids,...q.related_service_ids].join(', '),q.source_basis||'Scoper-derived draft']);
    return `<h2 class="pagebreak">Material Scoping Decisions</h2>${v312ReportTable(['Decision ID','Topic','Proposed disposition','Rationale','Affected records','Validating stakeholder','Status','Next action'],dRows)}<h2>Unresolved Boundary Unknowns</h2>${v312ReportTable(['Unknown / decision','State','Dependency or rationale','Expected respondent','Next action','Related questions'],uRows)}<h2 class="pagebreak">Pre-Workshop Questions — Answer Before Workshop</h2>${v312ReportTable(['Priority','Question','Expected respondent','Related records','Source basis'],qRows(before))}<h2>Pre-Workshop Questions — Address During Workshop</h2>${v312ReportTable(['Priority','Question','Expected respondent','Related records','Source basis'],qRows(during))}`;
  }
  function v312MaterialQuestions(pkg,limit=8){
    const all=v312Arr(pkg.pre_workshop_question_package_v1?.records).filter(q=>q.phase==='before_workshop');
    const preferred=['imported_scope_question','technology_profile_question','technology_profile_open_question','unknown_derived_question'];
    const chosen=[],seenTopics=new Set(),seenStems=new Set();
    const stem=q=>v312QuestionKey(q.question).split(' ').slice(0,6).join(' ');
    const addStrict=q=>{if(!q||chosen.length>=limit)return;const topic=v312QuestionKey(q.topic||q.value_origin),st=stem(q);if(seenTopics.has(topic)||seenStems.has(st))return;seenTopics.add(topic);seenStems.add(st);chosen.push(q)};
    preferred.forEach(origin=>all.filter(q=>q.value_origin===origin).forEach(addStrict));
    all.forEach(addStrict);
    for(const q of all){if(chosen.length>=limit)break;const st=stem(q);if(!seenStems.has(st)){seenStems.add(st);chosen.push(q)}}
    return chosen.slice(0,limit);
  }
  function v312ClientDecisions(pkg,limit=6){
    const all=v312Arr(pkg.scoping_decision_ledger_v1?.records).filter(d=>d.materiality==='boundary_blocker');
    const preferred=all.filter(d=>!/^Boundary validation item$/i.test(d.topic));
    return uniqBy([...preferred,...all],d=>v312QuestionKey(d.topic)).slice(0,limit);
  }
  function v312ClientSections(pkg){
    const decisions=v312ClientDecisions(pkg,6),questions=v312MaterialQuestions(pkg,8);
    const clarification=uniqBy(decisions.filter(d=>/provider/i.test(d.validating_stakeholder)||d.affected_provider_ids.length||d.affected_service_ids.length),d=>v312QuestionKey(d.topic)).slice(0,6);
    return `<h2>Top Proposed Boundary Decisions Requiring Validation</h2>${v312ReportTable(['Topic','Current proposal','Why validation is needed','Who should confirm'],decisions.map(d=>[d.topic,d.proposed_disposition,d.rationale,d.validating_stakeholder]))}<h2>Questions to Answer Before Workshop</h2><ul>${questions.map(q=>`<li><strong>${esc(q.question)}</strong> <span class="small">Expected response from ${esc(q.expected_respondent)}.</span></li>`).join('')||'<li>No high-priority pre-Workshop questions were generated.</li>'}</ul><h2>Provider and Client Clarification Needs</h2><ul>${clarification.map(d=>`<li>${esc(d.topic)} — ${esc(d.next_action)}</li>`).join('')||'<li>Confirm provider access, support location, evidence ownership, and responsibility sources for material services.</li>'}</ul>`;
  }
  makeAdvisorReport=function(){let base=v312Base.makeAdvisorReport(),add=v312AdvisorSections(makeReturn());base=base.replace('p,li{font-size:10.5pt}','p,li{font-size:10.5pt;page-break-inside:avoid}');return base.replace('</div></body></html>',add+'</div></body></html>')};
  makeClientReport=async function(){let base=await v312Base.makeClientReport(),add=v312ClientSections(makeReturn());base=base.replace('p,li{font-size:10.5pt}','p,li{font-size:10.5pt;page-break-inside:avoid}');return base.replace('<h2>Recommended next steps</h2>',add+'<h2>Recommended next steps</h2>')};

  function v312DeckLine(s,max=88){
    s=v312Text(s).replace(/[\n\r]+/g,' ');
    if(/engineering sandbox/i.test(s)&&/out[- ]of[- ]scope|specialized/i.test(s))return'Validate the sandbox category and confirm no production CUI was copied.';
    if(/exact environment, tenant type, edition, tier, and region/i.test(s))return'Confirm the exact environment, tenant type, edition, tier, and region.';
    if(/provider responsibilities are shared/i.test(s))return'Validate shared provider responsibilities and evidence ownership.';
    const complete=trimToCompletePhrase(s,max);
    return /\b(and|or|but|with|including|through|to|from|for|of|the|a|an|require|requires)\.?$/i.test(complete)?'Validate this material scoping item with the appropriate stakeholder.':complete;
  }
  trimToCompletePhrase=function(s,max=120){
    s=diagramCleanLabel(s);if(!s)return'';s=String(s).replace(/\s+/g,' ').trim();if(s.length<=max){if(/\b(and|or|with|including|through|to|from|for|of|the|a|an)$/i.test(s))s=s.replace(/\s+\S+$/,'');return /[.!?]$/.test(s)?s:s+'.'}
    const sentences=s.match(/[^.!?]+[.!?]+/g)||[];const fitting=sentences.find(x=>x.trim().length<=max);if(fitting)return fitting.trim();
    let out='';for(const w of s.split(/\s+/)){const next=(out+' '+w).trim();if(next.length>max)break;out=next}
    out=out.replace(/[,:;\-–—/\s]+$/,'').trim();while(/\b(and|or|with|including|through|to|from|for|of|the|a|an|provider|service)\.?$/i.test(out))out=out.replace(/\s+\S+$/,'').trim();
    if(out.length<18)return'Validate this draft scoping item.';return /[.!?]$/.test(out)?out:out+'.';
  };
  function v312DeckQuestions(pkg){return v312MaterialQuestions(pkg,5)}
  clientDeckValues=function(){
    const vals=v312Base.clientDeckValues(),pkg=makeReturn(),decisions=v312Arr(pkg.scoping_decision_ledger_v1?.records).filter(d=>d.materiality==='boundary_blocker').slice(0,5),questions=v312DeckQuestions(pkg),m=v312Metrics(pkg);
    vals['{{open_assumptions_bullets}}']=bulletList(decisions.map(d=>v312DeckLine(`${d.topic}: proposed ${d.proposed_disposition}; ${d.rationale}`,76)));
    vals['{{provider_validation_bullets}}']=bulletList(questions.map(q=>v312DeckLine(q.question,76)));
    vals['{{provider_dependency_summary}}']=`${m.boundary_blockers} boundary blocker(s) and ${m.before_questions} before-Workshop question(s) require stakeholder validation.`;
    vals['{{next_steps_summary}}']=v312DeckLine(`Resolve ${m.boundary_blockers} boundary blocker(s), answer ${m.before_questions} pre-Workshop question(s), and validate the remaining decisions during Workshop.`,110);

    vals['{{storage_backup_summary}}']='Confirm CUI storage, backup, replication, retention, and restore access.';
    vals['{{support_provider_summary}}']='Confirm provider and administrator support paths and evidence ownership.';
    vals['{{asset_inventory_validation}}']='Confirm the inventory includes all assets and services that handle or protect CUI.';
    vals['{{provider_scope_validation}}']='Confirm provider access, support locations, data exposure, and evidence ownership.';
    vals['{{data_flow_validation}}']='Confirm CUI ingress, processing, storage, backup, remote access, and delivery paths.';
    vals['{{ssp_alignment_validation}}']='Confirm the SSP, diagrams, inventories, and responsibility records match the draft boundary.';
    return vals;
  };

  init=function(){
    v312SanitizeStateQuestions();v312Base.init();
    try{document.title='L2G Scoper v3.12';const sub=document.querySelector('.brand .sub');if(sub)sub.textContent='CUI Boundary / Scoping • v3.12';document.documentElement.dataset.scoperVersion=SCOPER_V312}catch(e){}
    if(!document.getElementById('v312Styles')){const st=document.createElement('style');st.id='v312Styles';st.textContent=`.v312-metrics{margin:12px 0}.v312-metrics .card{padding:15px}.v312-metrics .metric{font-size:30px}.v312-metrics .metriclabel{font-size:.76rem}#tab-review .data td{min-width:130px}#tab-review .data td:nth-child(2){min-width:310px}#tab-review .data td:nth-child(7){min-width:260px}@media(max-width:1100px){.v312-metrics{grid-template-columns:repeat(2,minmax(0,1fr))}}`;document.head.appendChild(st)}
  };
  window.v312Release={version:SCOPER_V312,makeReturn:()=>makeReturn(),metrics:()=>v312Metrics(),sanitizeQuestions:v312SanitizeQuestions};
})();


init();
